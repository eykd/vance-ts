name: Continuous integration & deployment

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Check for unused code
        run: npm run lint:unused

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Validate workflows
        run: npx -y @tktco/node-actionlint

      - name: Build
        run: npm run build

      - name: Check for Hugo site
        id: check-hugo-quality
        run: |
          if [ -d "hugo" ] && [ -f "hugo/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Hugo dependencies
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: cd hugo && npm install

      - name: Hugo build smoke test
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: cd hugo && npm test

      - name: Test (Workers runtime, with retry)
        id: test-workers
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: npm run test:ci

      - name: Detect flaky tests
        id: flaky-check
        if: "!cancelled() && steps.check-hugo-quality.outputs.exists == 'true'"
        run: |
          if [ -f test-results.json ]; then
            npx tsx scripts/detect-flaky-tests.ts test-results.json > flaky-report.json
            echo "has_report=true" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: '!cancelled()'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results.json
            flaky-report.json
          if-no-files-found: ignore

      - name: Comment on PR with flaky tests
        if: github.event_name == 'pull_request' && steps.flaky-check.outputs.has_report == 'true' && !cancelled()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('flaky-report.json')) return;
            const report = JSON.parse(fs.readFileSync('flaky-report.json', 'utf-8'));
            if (report.totalFlaky === 0) return;

            let body = '## Flaky Tests Detected\n\n';
            body += 'The following tests passed only after being retried:\n\n';
            body += '| Test | File | Passed on retry |\n';
            body += '|------|------|----------------|\n';
            for (const test of report.flakyTests) {
              body += `| ${test.testName} | \`${test.filePath}\` | ${test.passedOnRetry} |\n`;
            }
            body += '\nThese tests are unreliable and should be investigated.\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['flaky-tests'],
            });

  mutation-testing:
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for domain/application changes
        id: check-changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- src/domain/ src/application/ || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Use Node.js 24.x
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-changes.outputs.has_changes == 'true'
        run: npm ci

      - name: Run mutation testing
        if: steps.check-changes.outputs.has_changes == 'true'
        run: npm run test:mutants

      - name: Upload mutation report
        if: steps.check-changes.outputs.has_changes == 'true' && !cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: ignore

      - name: Comment on PR with mutation score
        if: steps.check-changes.outputs.has_changes == 'true' && !cancelled()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('reports/mutation/mutation.json')) return;
            const report = JSON.parse(fs.readFileSync('reports/mutation/mutation.json', 'utf-8'));

            const score = ((report.thresholds?.score ?? report.metrics?.mutationScore) || 0).toFixed(1);
            const killed = report.metrics?.killed || 0;
            const survived = report.metrics?.survived || 0;
            const noCoverage = report.metrics?.noCoverage || 0;
            const timeout = report.metrics?.timeout || 0;
            const total = report.metrics?.totalMutants || (killed + survived + noCoverage + timeout);

            const marker = '<!-- stryker-mutation-comment -->';
            let body = `${marker}\n## Mutation Testing Report\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| **Mutation Score** | ${score}% |\n`;
            body += `| Killed | ${killed} |\n`;
            body += `| Survived | ${survived} |\n`;
            body += `| No Coverage | ${noCoverage} |\n`;
            body += `| Timeout | ${timeout} |\n`;
            body += `| Total | ${total} |\n\n`;

            if (survived > 0) {
              body += `<details>\n<summary>${survived} surviving mutant(s) — click to expand</summary>\n\n`;
              const files = report.files || {};
              for (const [file, data] of Object.entries(files)) {
                const survivingMutants = (data.mutants || []).filter(m => m.status === 'Survived');
                for (const m of survivingMutants) {
                  body += `- **${file}:${m.location?.start?.line}** — ${m.mutatorName}: \`${m.replacement || m.description || 'see report'}\`\n`;
                }
              }
              body += `\n</details>\n`;
            }

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  deploy:
    # Deploy on push (production) and PRs (preview URLs)
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for wrangler.toml
        id: check-wrangler
        run: |
          if [ -f "wrangler.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if wrangler.toml is configured
        id: check-configured
        if: steps.check-wrangler.outputs.exists == 'true'
        run: |
          NAME=$(grep -E '^name\s*=' wrangler.toml | head -1 | sed 's/^name\s*=\s*"\([^"]*\)".*/\1/')
          DB_ID=$(grep -E '^database_id\s*=' wrangler.toml | head -1 | sed 's/^database_id\s*=\s*"\([^"]*\)".*/\1/')
          if [ "$NAME" = "turtlebased-ts" ] || [ "$NAME" = "turtlebased" ] || \
             [ "$DB_ID" = "00000000-0000-0000-0000-000000000000" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::wrangler.toml has placeholder values. Run the 'start' command to configure your project before deploying."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for Hugo site
        id: check-hugo
        run: |
          if [ -d "hugo" ] && [ -f "hugo/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for Cloudflare credentials
        id: check-credentials
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.x
          cache: 'npm'

      # Extract Worker name from wrangler.toml for preview deployments
      - name: Extract Worker name from wrangler.toml
        id: worker-name
        if: steps.check-wrangler.outputs.exists == 'true'
        run: |
          PROJECT_NAME=$(grep -E '^name\s*=' wrangler.toml | head -1 | sed 's/^name\s*=\s*"\([^"]*\)".*/\1/')
          echo "name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-credentials.outputs.configured == 'true'
        run: npm ci

      - name: Build Hugo site
        if: steps.check-hugo.outputs.exists == 'true' && steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-credentials.outputs.configured == 'true'
        run: |
          cd hugo && npm install && npx hugo --minify && cd ..
          node scripts/sync-asset-paths.js
          node scripts/check-route-collisions.js

      - name: Deploy to Cloudflare Workers
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-hugo.outputs.exists == 'true' && steps.check-credentials.outputs.configured == 'true' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy Preview (PR)
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-hugo.outputs.exists == 'true' && steps.check-credentials.outputs.configured == 'true' && github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ steps.worker-name.outputs.name }}-pr-${{ github.event.pull_request.number }}
