name: Continuous integration & deployment

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Check for unused code
        run: npm run lint:unused

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Validate workflows
        run: npx -y @tktco/node-actionlint

      - name: Build
        run: npm run build

      - name: Check for Hugo site
        id: check-hugo-quality
        run: |
          if [ -d "hugo" ] && [ -f "hugo/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Hugo dependencies
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: cd hugo && npm install

      - name: Hugo build smoke test
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: cd hugo && npm test

      - name: Test (Workers runtime)
        if: steps.check-hugo-quality.outputs.exists == 'true'
        run: npm run test:workers

  deploy:
    # Deploy on push (production) and PRs (preview URLs)
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for wrangler.toml
        id: check-wrangler
        run: |
          if [ -f "wrangler.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if wrangler.toml is configured
        id: check-configured
        if: steps.check-wrangler.outputs.exists == 'true'
        run: |
          NAME=$(grep -E '^name\s*=' wrangler.toml | head -1 | sed 's/^name\s*=\s*"\([^"]*\)".*/\1/')
          DB_ID=$(grep -E '^database_id\s*=' wrangler.toml | head -1 | sed 's/^database_id\s*=\s*"\([^"]*\)".*/\1/')
          if [ "$NAME" = "turtlebased-ts" ] || [ "$NAME" = "turtlebased" ] || \
             [ "$DB_ID" = "00000000-0000-0000-0000-000000000000" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::wrangler.toml has placeholder values. Run the 'start' command to configure your project before deploying."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for Hugo site
        id: check-hugo
        run: |
          if [ -d "hugo" ] && [ -f "hugo/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for Cloudflare credentials
        id: check-credentials
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.x
          cache: 'npm'

      # Extract Worker name from wrangler.toml for preview deployments
      - name: Extract Worker name from wrangler.toml
        id: worker-name
        if: steps.check-wrangler.outputs.exists == 'true'
        run: |
          PROJECT_NAME=$(grep -E '^name\s*=' wrangler.toml | head -1 | sed 's/^name\s*=\s*"\([^"]*\)".*/\1/')
          echo "name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-credentials.outputs.configured == 'true'
        run: npm ci

      - name: Build Hugo site
        if: steps.check-hugo.outputs.exists == 'true' && steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-credentials.outputs.configured == 'true'
        run: |
          cd hugo && npm install && npx hugo --minify && cd ..
          node scripts/sync-asset-paths.js
          node scripts/check-route-collisions.js

      - name: Deploy to Cloudflare Workers
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-hugo.outputs.exists == 'true' && steps.check-credentials.outputs.configured == 'true' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy Preview (PR)
        if: steps.check-wrangler.outputs.exists == 'true' && steps.check-configured.outputs.configured == 'true' && steps.check-hugo.outputs.exists == 'true' && steps.check-credentials.outputs.configured == 'true' && github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ steps.worker-name.outputs.name }}-pr-${{ github.event.pull_request.number }}
