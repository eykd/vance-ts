{{ define "main" }}
<div
  x-data
  data-redirect-url="{{ .RelPermalink }}"
  x-init="if (!$store.auth?.isAuthenticated) { $el.querySelector('[role=status]').textContent = 'Redirecting to sign in...'; window.location.replace('/auth/sign-in?redirectTo=' + encodeURIComponent($el.dataset.redirectUrl)); }"
>
  {{/* Screen reader announcement for redirect */}}
  <p role="status" class="sr-only"></p>
  <div class="container mx-auto p-8" x-cloak :class="{ 'hidden': !$store.auth?.isAuthenticated }">
    <h1 class="text-3xl font-bold">{{ .Title }}</h1>
    {{ .Content }}
  </div>
  <noscript>
    <div class="container mx-auto p-8">
      <h1 class="text-3xl font-bold">{{ .Title }}</h1>
      <p>JavaScript is required to access the dashboard. Please <a href="/auth/sign-in">sign in</a>.</p>
    </div>
  </noscript>
</div>
{{ end }}
