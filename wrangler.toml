name = "vance"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[assets]
directory = "./hugo/public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/app/*", "/auth/*", "/dashboard", "/dashboard/*"]

[[d1_databases]]
binding = "DB"
database_name = "vance"
database_id = "dc38112c-f52f-432a-abd8-e7d130fda3c8"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimitDO"]
