name = "vance-ts"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./hugo/public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "vance-db"
database_id = "LOCAL_DEV_PLACEHOLDER"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimitDO"]
