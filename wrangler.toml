name = "clawtask"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
BETTER_AUTH_URL = "https://meetclawtask.com"
SENTRY_DSN = "https://7bca9511c888608a009a723f2559af55@o4506101095137280.ingest.us.sentry.io/4511106056912896"

routes = [
  { pattern = "meetclawtask.com", custom_domain = true },
  { pattern = "www.meetclawtask.com", custom_domain = true },
]

[dev]
port = 8787

[assets]
directory = "./hugo/public"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/api/*", "/app", "/app/*", "/auth/*", "/dashboard", "/dashboard/*"]

[[d1_databases]]
binding = "DB"
database_name = "clawtask"
database_id = "af4840f9-c958-4c16-ae79-f71e662e9643"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "GRAMMAR_KV"
id = "1240cd8f9e3e4a15bff1dd3c9cead5d9"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimitDO"]
