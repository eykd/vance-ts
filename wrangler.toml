name = "clawtask"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "meetclawtask.com", custom_domain = true },
  { pattern = "www.meetclawtask.com", custom_domain = true },
]

[dev]
port = 8787

[assets]
directory = "./hugo/public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/app/*", "/auth/*", "/dashboard", "/dashboard/*"]

[[d1_databases]]
binding = "DB"
database_name = "clawtask"
database_id = "af4840f9-c958-4c16-ae79-f71e662e9643"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimitDO"]
